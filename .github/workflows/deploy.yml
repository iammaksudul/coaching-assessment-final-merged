name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            APP_DIR="/var/www/coaching-digs"
            REPO="https://github.com/iammaksudul/coaching-assessment-final-merged.git"

            # Clone or pull
            if [ -d "$APP_DIR/.git" ]; then
              cd $APP_DIR
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf $APP_DIR
              git clone $REPO $APP_DIR
              cd $APP_DIR
            fi

            # Install dependencies
            npm ci --production=false

            # Create .env from secrets
            cat > .env.local << 'ENVEOF'
            ${{ secrets.ENV_FILE }}
            ENVEOF
            # Remove leading whitespace from heredoc
            sed -i 's/^[[:space:]]*//' .env.local

            # Build using local next binary explicitly
            ./node_modules/.bin/next build

            # Restart with PM2
            pm2 describe coaching-digs > /dev/null 2>&1 && pm2 restart coaching-digs || pm2 start npm --name "coaching-digs" -- start
            pm2 save

            echo "Deployed successfully"
